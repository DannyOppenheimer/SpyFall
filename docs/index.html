<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="keywords" content="spyfall, online spyfall game, social deduction game, party game, multiplayer game, spyfall 1, spyfall 2, location guessing game" />

    <title>SpyFall Online — Free Multiplayer Social Deduction Game</title>

    <style>
        body {
            background-color: #0d0d0d;
        }
    </style>

    <link rel="icon" href="Spy.png" type="image/png" sizes="16x16">
    <link href="https://fonts.googleapis.com/css?family=Josefin+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="index.css">
    <link rel="stylesheet" type="text/css" href="global_css.css">

    <link rel="canonical" href="https://spyfall.dannyoppenheimer.com" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Game",
      "name": "SpyFall Online",
      "description": "A free online multiplayer social deduction game where one player is secretly the spy and must figure out the location while others try to identify them.",
      "url": "https://spyfall.dannyoppenheimer.com",
      "image": "https://spyfall.dannyoppenheimer.com/Spy.png",
      "gameServer": "https://spyfall-production-5f2b.up.railway.app",
      "author": {
        "@type": "Person",
        "name": "Danny Oppenheimer"
      },
      "applicationCategory": "GameApplication",
      "playMode": "MultiPlayer",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <script src="index.js"></script>
</head>

<body>
    <header>
        <nav>
            <button id="button_rules" type="button" value="How To Play" onclick="rules()">How To Play</button>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="title">
                <h1>SpyFall</h1>
            </div>

            <br>
            <div class="buttons">
                <input type="text" id="name_field" placeholder="Please enter your name." maxlength="25" onkeypress="enterPress(event)">
                <p id="error_message"></p>

                <button type="button" id="create_room_button" onclick="createRoom()">Create Room</button>
                <br>
                <button type="button" id="join_room_button" onclick="joinRoom()">Join Room</button>
            </div>
        </div>
    </main>

    <footer>
        <p id="footer_text">Source code: <a href="https://github.com/DannyOppenheimer/SpyFall" target="_blank" rel="noopener noreferrer"><img id="git_image" src="git_image.png" alt="GitHub repository"></a></p>
    </footer>

</body>

</html>
