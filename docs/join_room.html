		  "@type": "WebPage",
		  "name": "Join SpyFall Game Room",
		  "description": "Join an existing multiplayer SpyFall game room using a room code",

	<body>
		<header>
			<button id="back" type="button" value="Back">Back</button>
		</header>

		<main>
			<div class="title">
				<h1>Join Game Room</h1>
			</div>

			<form>
				<label for="key_enter">Enter the 5-letter room code:</label>
				<input id="key_enter" type="text" placeholder="Type the 5 letter code." maxlength="5" pattern="[a-z]" aria-label="Room code" />
				<div id="no_key_err" role="alert"></div>
				<br />
				<button id="join_room_button" type="button">Join Room</button>
			</form>
		</main>
	</body>
